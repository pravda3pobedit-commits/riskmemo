<svg xmlns="http://www.w3.org/2000/svg" width="980" height="720" viewBox="0 0 980 720" role="img" aria-labelledby="title desc">
  <title id="title">Example manual risk review</title>
  <desc id="desc">Visual example of a suspicious message review with warning signs, verification questions, and a safe reply.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset="1" stop-color="#e5edf8" stop-opacity=".96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="980" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="780" cy="140" r="120" fill="#22c55e" opacity=".14"/>
  <circle cx="210" cy="560" r="150" fill="#38bdf8" opacity=".10"/>
  <g filter="url(#shadow)">
    <rect x="86" y="72" width="808" height="576" rx="24" fill="url(#panel)"/>
  </g>
  <rect x="126" y="116" width="238" height="36" rx="18" fill="#dcfce7"/>
  <text x="148" y="140" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">Risk review</text>
  <text x="126" y="198" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Suspicious message</text>
  <text x="126" y="236" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Manual review: warning signs, context, and a calm reply.</text>
  <rect x="126" y="284" width="210" height="74" rx="16" fill="#fee2e2"/>
  <text x="150" y="314" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Risk</text>
  <text x="150" y="340" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#7f1d1d">Medium / high</text>
  <rect x="362" y="284" width="392" height="74" rx="16" fill="#e0f2fe"/>
  <text x="386" y="314" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#075985">Main signal</text>
  <text x="386" y="340" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#0c4a6e">Pressure + unverifiable details</text>
  <g font-family="Inter, Arial, sans-serif">
    <text x="126" y="408" font-size="18" font-weight="800" fill="#111827">Warning signs</text>
    <circle cx="134" cy="438" r="5" fill="#ef4444"/>
    <text x="152" y="444" font-size="16" fill="#334155">Urgency before identity verification</text>
    <circle cx="134" cy="470" r="5" fill="#ef4444"/>
    <text x="152" y="476" font-size="16" fill="#334155">Request to pay a fee or open a link</text>
    <circle cx="134" cy="502" r="5" fill="#ef4444"/>
    <text x="152" y="508" font-size="16" fill="#334155">Scripted wording with few concrete details</text>
    <text x="126" y="558" font-size="18" font-weight="800" fill="#111827">Verification question</text>
    <text x="126" y="588" font-size="16" fill="#334155">"Please send company email, website, and contract before documents."</text>
  </g>
  <rect x="664" y="412" width="170" height="44" rx="22" fill="#0f172a"/>
  <text x="701" y="440" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Reply calmly</text>
</svg>
